services:
  - type: web
    name: stockchaser
    runtime: python
    plan: starter        # $7/月，常驻不睡眠，可挂 Persistent Disk
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn serve:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120
    envVars:
      - key: RENDER
        value: true
      - key: USE_MOCK
        value: false      # set to true for demo/staging without real yfinance calls
      # Telegram bot (set values in Render dashboard, NOT in this file).
      # Empty / unset = notifier silently no-ops.
      - key: TELEGRAM_BOT_TOKEN
        sync: false       # secret — fill in via Render dashboard
      - key: TELEGRAM_CHAT_ID
        sync: false       # secret — fill in via Render dashboard
      - key: TELEGRAM_NOTIFY_ON_START
        value: "0"        # "1" to send a snapshot message on cold start
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false       # optional but recommended — Telegram echoes this
                          # back as X-Telegram-Bot-Api-Secret-Token header so
                          # we can reject calls from anyone else
    healthCheckPath: /api/status
    disk:
      name: stockchaser-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1           # $0.25/GB/月 ≈ $0.25 额外
