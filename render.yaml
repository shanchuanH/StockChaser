services:
  - type: web
    name: stockchaser
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn serve:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120
    envVars:
      - key: RENDER
        value: true
      - key: USE_MOCK
        value: false      # set to true for demo/staging without real yfinance calls
      # Telegram bot (set values in Render dashboard, NOT in this file).
      # Empty / unset = notifier silently no-ops.
      - key: TELEGRAM_BOT_TOKEN
        sync: false       # secret — fill in via Render dashboard
      - key: TELEGRAM_CHAT_ID
        sync: false       # secret — fill in via Render dashboard
      - key: TELEGRAM_NOTIFY_ON_START
        value: "0"        # "1" to send a snapshot message on cold start
    healthCheckPath: /api/status
