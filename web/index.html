<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>StockChaser - AI链追涨看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--up:#d63031;--down:#00a86b;--warn:#f39c12;--bg:#0d1117;--bg2:#161b22;--bg3:#1f2630;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--accent:#58a6ff;--buy:#3fb950;--strong:#d63031}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;font-size:13px}
header{background:linear-gradient(135deg,#1f2630,#0d1117);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:18px;font-weight:600}
header h1 .sub{color:var(--text2);font-weight:400;font-size:12px;margin-left:8px}
.regime-badge{margin-left:12px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;background:#21262d}
.meta{color:var(--text2);font-size:11px;text-align:right;line-height:1.5}
.meta .live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--down);margin-right:4px;vertical-align:middle;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.refresh-btn{background:var(--accent);color:#000;border:none;padding:5px 11px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600;margin-left:8px}
.refresh-btn:disabled{opacity:.4;cursor:wait}
.mock-banner{background:var(--warn);color:#000;text-align:center;padding:4px;font-size:12px;font-weight:600}
.controls{display:flex;gap:8px;padding:10px 20px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.tab{background:var(--bg3);color:var(--text);border:1px solid var(--border);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.tab.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.tab .count{color:var(--text2);margin-left:4px;font-size:11px}
.tab.active .count{color:rgba(0,0,0,.6)}
.search{margin-left:auto;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;width:180px;font-size:12px}
.sort{background:var(--bg3);color:var(--text);border:1px solid var(--border);padding:6px 10px;border-radius:6px;font-size:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{background:var(--bg2);position:sticky;top:0;z-index:5}
th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text2);font-weight:500;font-size:11px;text-transform:uppercase;white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid #21262d;vertical-align:middle}
tr.row:hover{background:var(--bg2);cursor:pointer}
tr.row.expanded{background:var(--bg3)}
tr.detail td{background:#0d1218;padding:14px 20px;border-bottom:2px solid var(--accent)}
.ticker{font-weight:700;color:var(--accent);font-size:14px}
.name{color:var(--text2);margin-left:6px;font-size:11px}
.layer-tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;background:#21262d;color:#c9d1d9;white-space:nowrap}
.role-tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600}
.role-龙头{background:#1f6f3f;color:#d4f8d4}.role-二线{background:#735c12;color:#fff5cf}.role-概念{background:#6e2a2a;color:#ffd0d0}
.num{font-variant-numeric:tabular-nums;text-align:right;font-weight:500}
.up{color:var(--up)}.down{color:var(--down)}.stars{color:#ffcc00;letter-spacing:1px}
.signals{display:flex;gap:4px;flex-wrap:wrap}
.sig{background:var(--bg3);color:var(--text);padding:2px 6px;border-radius:3px;font-size:10.5px;border:1px solid var(--border)}
.sig.buy{background:rgba(63,185,80,.15);border-color:var(--buy);color:var(--buy)}
.sig.warn{background:rgba(243,156,18,.15);border-color:var(--warn);color:var(--warn)}
.composite-bar{display:inline-block;width:50px;height:6px;background:var(--bg3);border-radius:3px;margin-left:6px;vertical-align:middle;overflow:hidden}
.composite-bar>div{height:100%;background:linear-gradient(90deg,#3fb950,var(--up));border-radius:3px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.detail-grid h4{color:var(--accent);font-size:12px;text-transform:uppercase;margin-bottom:6px;border-bottom:1px solid var(--border);padding-bottom:4px}
.detail-grid p{line-height:1.6;color:#c9d1d9;font-size:12px}
.detail-grid .label{color:var(--text2);font-size:11px;text-transform:uppercase;margin-right:8px}
.footer{text-align:center;color:var(--text2);font-size:11px;padding:18px 0;border-top:1px solid var(--border)}
.view{display:none}.view.active{display:block}
.backtest-wrap{padding:20px}
.backtest-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:20px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px}
.stat .label{color:var(--text2);font-size:11px;text-transform:uppercase}
.stat .value{font-size:22px;font-weight:700;margin-top:4px}
.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:20px}
.chart-wrap h3{font-size:13px;color:var(--text2);margin-bottom:12px}
.empty-bt{padding:40px;text-align:center;color:var(--text2)}
.empty-bt code{background:var(--bg3);padding:2px 6px;border-radius:3px}
.view-tabs{display:flex;gap:4px;padding:6px 20px;background:#1a1f26;border-bottom:1px solid var(--border)}
.view-tab{padding:6px 14px;background:transparent;color:var(--text2);border:none;cursor:pointer;font-size:12px;border-bottom:2px solid transparent}
.view-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.action-tag{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;white-space:nowrap}
.size-tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:11px;font-weight:600;background:#21262d;color:#c9d1d9;white-space:nowrap}
.horizon-tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10.5px;background:#1a3a4f;color:#9bd5ff;white-space:nowrap}
.conviction-bar{display:inline-block;width:60px;height:8px;background:var(--bg3);border-radius:4px;margin-left:6px;vertical-align:middle;overflow:hidden}
.conviction-bar>div{height:100%;border-radius:4px}
.subscore{font-size:10px;color:var(--text2)}
</style>
</head>
<body>
<header>
  <h1>📊 StockChaser <span class="sub">AI链 · 追涨看板 v3</span><span class="regime-badge" id="regime-badge">—</span></h1>
  <div class="meta" id="meta">
    <div><span class="live-dot"></span><span id="last-updated">连接中...</span></div>
    <div>SPY 4w: <span id="spy">-</span> &nbsp;<button class="refresh-btn" id="refresh-btn">刷新</button></div>
  </div>
</header>
<div id="mock-banner" class="mock-banner" style="display:none">⚠️ MOCK 数据。生产用 <code>python serve.py</code></div>
<div class="view-tabs">
  <button class="view-tab active" data-view="dashboard">📊 实时看板</button>
  <button class="view-tab" data-view="backtest">📈 策略回测</button>
  <button class="view-tab" data-view="portfolio">💼 我的持仓 <span id="vt-portfolio-count" style="background:#3fb950;color:#000;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:4px">0</span></button>
</div>
<div class="view active" id="view-dashboard">
  <div class="controls">
    <button class="tab active" data-filter="all">🌐 全部 <span class="count" id="c-all">0</span></button>
    <button class="tab" data-filter="priority" style="background:linear-gradient(135deg,#ff4757,#d63031);border-color:#ff7676;color:#fff;font-weight:700">🔥 今日 PRIORITY <span class="count" id="c-priority">0</span></button>
    <button class="tab" data-filter="STRONG_BUY" style="background:rgba(214,48,49,.2);border-color:#d63031;color:#ff7676">强力买入候选 <span class="count" id="c-STRONG_BUY">0</span></button>
    <button class="tab" data-filter="BUY" style="background:rgba(63,185,80,.18);border-color:#3fb950;color:#7ee18a">🟢 买入 <span class="count" id="c-BUY">0</span></button>
    <button class="tab" data-filter="TRY_BUY" style="background:rgba(241,196,15,.15);border-color:#f1c40f;color:#ffd84d">🟡 试仓 <span class="count" id="c-TRY_BUY">0</span></button>
    <button class="tab" data-filter="core">🎯 核心池 <span class="count" id="c-core">0</span></button>
    <button class="tab" data-filter="BREAKOUT">🚀 突破4周高 <span class="count" id="c-BREAKOUT">0</span></button>
    <button class="tab" data-filter="STRONG_WEEK">📊 本周+3% <span class="count" id="c-STRONG_WEEK">0</span></button>
    <button class="tab" data-filter="TREND_PULLBACK">🎯 趋势回调 <span class="count" id="c-TREND_PULLBACK">0</span></button>
    <button class="tab" data-filter="RS_LEADER">💪 RS领涨 <span class="count" id="c-RS_LEADER">0</span></button>
    <select class="sort" id="sort">
      <option value="conviction_score">按置信度</option>
      <option value="composite_score">按综合分</option>
      <option value="trend_strength">按趋势强度</option>
      <option value="entry_quality">按入场质量</option>
      <option value="week_return_pct">按周涨幅</option>
      <option value="rs_vs_spy_4w_pp">按RS vs SPY</option>
    </select>
    <input type="text" class="search" id="search" placeholder="搜索ticker/公司...">
  </div>
  <table>
    <thead><tr>
      <th>#</th><th>Ticker</th><th>层级</th><th>★</th>
      <th>📌建议</th><th>💰仓位</th><th>⏱周期</th>
      <th class="num">价格</th><th class="num">周涨</th><th class="num">月涨</th>
      <th class="num">距4W高</th><th class="num">RS</th>
      <th>信号</th>
      <th class="num">置信度</th><th class="num">建议止损</th><th>持仓</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<div class="view" id="view-backtest">
  <div class="backtest-wrap" id="bt-content">
    <div class="empty-bt"><p>回测数据未生成。请先运行：</p><p style="margin-top:8px"><code>python scripts/bt_v33.py</code></p></div>
  </div>
</div>
<div class="view" id="view-portfolio">
  <div class="backtest-wrap" id="pf-content"></div>
</div>
<div class="footer">StockChaser v3 · Conviction Engine · 三轴评分 × 渐变 Regime</div>
<script>
let data=null,backtestData=null,chartInstance=null;
let currentFilter="all",currentSort="conviction_score",searchQuery="",expandedTicker=null;
let _retryTimer=null,_dots=0;
const isLocalServer=location.protocol.startsWith("http")&&location.host;
const apiData=isLocalServer?"/api/data":"../data/signals.json";
const apiStatus=isLocalServer?"/api/status":null;
const apiBacktest=isLocalServer?"/api/backtest":"../data/backtest_results.json";
const apiRefresh=isLocalServer?"/api/refresh":null;

function fmtAgo(iso){if(!iso)return"-";const d=new Date(iso);const m=Math.floor((Date.now()-d.getTime())/60000);if(m<1)return"刚刚";if(m<60)return m+" 分钟前";const h=Math.floor(m/60);if(h<24)return h+" 小时前";return d.toLocaleString("zh-CN")}
function fmt(v,sfx,d){d=d==null?2:d;if(v==null)return"-";const n=Number(v);return isNaN(n)?"-":n.toFixed(d)+(sfx||"")}
function colorClass(v){if(v==null)return"";return v>0?"up":(v<0?"down":"")}
function arrow(v){if(v==null)return"";return v>0?"▲ ":(v<0?"▼ ":"")}
function convColor(v){
  if(v>=80)return "#d63031";
  if(v>=65)return "#3fb950";
  if(v>=50)return "#f1c40f";
  if(v>=35)return "#8b949e";
  return "#5a5a5a";
}

function _scheduleRetry(){
  if(_retryTimer)return;
  _retryTimer=setTimeout(()=>{_retryTimer=null;loadData();},5000);
}

async function _showInitStatus(){
  // Poll /api/status to show a meaningful message while pipeline is running
  const el=document.getElementById("last-updated");
  _dots=(_dots+1)%4;
  const dots=".".repeat(_dots+1);
  if(apiStatus){
    try{
      const s=await fetch(apiStatus+"?_="+Date.now());
      if(s.ok){
        const st=await s.json();
        if(st.refreshing)el.textContent="数据抓取中，请稍候"+dots;
        else el.textContent="即将就绪，稍候"+dots;
        return;
      }
    }catch(_){}
  }
  el.textContent="初始化中，请稍候"+dots;
}

async function loadData(){
  try{
    const r=await fetch(apiData+"?_="+Date.now());
    if(r.status===404){
      // Pipeline still running — show status and auto-retry
      await _showInitStatus();
      _scheduleRetry();
      return;
    }
    if(!r.ok)throw new Error("HTTP "+r.status);
    // Success: cancel any pending retry
    if(_retryTimer){clearTimeout(_retryTimer);_retryTimer=null;}
    data=await r.json();
    document.getElementById("last-updated").textContent="更新于 "+fmtAgo(data.generated_at);
    const sp=data.spy_4w_return_pct,el=document.getElementById("spy");
    if(sp!=null){el.textContent=(sp>=0?"+":"")+sp+"%";el.className=sp>=0?"up":"down"}
    document.getElementById("mock-banner").style.display=data.is_mock?"block":"none";
    const rb=document.getElementById("regime-badge");
    if(data.regime_label){
      rb.textContent=data.regime_label+" ×"+data.regime_modifier;
      rb.style.background=data.regime_modifier>=1?"rgba(63,185,80,.2)":data.regime_modifier>=0.85?"rgba(241,196,15,.15)":"rgba(214,48,49,.2)";
    }
    updateCounts();render();
  }catch(e){
    document.getElementById("last-updated").textContent="连接失败，5s后重试…";
    _scheduleRetry();
  }
}

function updateCounts(){
  if(!data)return;
  document.getElementById("c-all").textContent=data.rows.length;
  document.getElementById("c-core").textContent=data.rows.filter(r=>r.potential===5&&r.strategy==="核心配置").length;
  ["STRONG_BUY","BUY","TRY_BUY"].forEach(k=>{
    document.getElementById("c-"+k).textContent=data.rows.filter(r=>r.action===k).length;
  });
  const priorityEl=document.getElementById("c-priority");
  if(priorityEl)priorityEl.textContent=data.rows.filter(r=>r.is_priority).length;
  ["BREAKOUT","STRONG_WEEK","TREND_PULLBACK","RS_LEADER"].forEach(k=>{
    document.getElementById("c-"+k).textContent=data.rows.filter(r=>r.signals.includes(k)).length;
  });
}

function filterRows(){
  let rows=data.rows.slice();
  if(currentFilter==="core")rows=rows.filter(r=>r.potential===5&&r.strategy==="核心配置");
  else if(currentFilter==="priority")rows=rows.filter(r=>r.is_priority);
  else if(["STRONG_BUY","BUY","TRY_BUY"].includes(currentFilter))rows=rows.filter(r=>r.action===currentFilter);
  else if(currentFilter!=="all")rows=rows.filter(r=>r.signals.includes(currentFilter));
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    rows=rows.filter(r=>r.ticker.toLowerCase().includes(q)||(r.name||"").toLowerCase().includes(q)||(r.layer||"").toLowerCase().includes(q));
  }
  rows.sort((a,b)=>(b[currentSort]??-999)-(a[currentSort]??-999));
  return rows;
}

function renderRow(r,i){
  const meta=data.signal_meta;
  const am=data.action_meta[r.action]||{emoji:"?",label:"-",color:"#8b949e"};
  const sigs=r.signals.map(s=>'<span class="sig '+meta[s].buy_class+'">'+meta[s].emoji+" "+meta[s].label+"</span>").join("");
  const stars="★".repeat(r.potential||0);
  const cv=r.conviction_score||0;
  const cvColor=convColor(cv);
  return '<tr class="row '+(expandedTicker===r.ticker?"expanded":"")+'" data-ticker="'+r.ticker+'">'+
    "<td>"+(i+1)+"</td>"+
    '<td><span class="ticker">'+r.ticker+'</span><span class="name">'+(r.name||"")+"</span></td>"+
    '<td><span class="layer-tag">'+(r.layer||"")+"</span></td>"+
    '<td class="stars">'+stars+"</td>"+
    '<td>'+(r.is_priority?'<span style="display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:700;background:linear-gradient(135deg,#ff4757,#d63031);color:#fff;margin-right:4px">🔥 #'+r.priority_rank+'</span>':'')+'<span class="action-tag" style="background:'+am.color+'33;color:'+am.color+';border:1px solid '+am.color+'">'+am.emoji+" "+am.label+"</span>"+
    (r.framework_tags&&r.framework_tags.length?'<div style="margin-top:3px;display:flex;gap:2px;flex-wrap:wrap">'+r.framework_tags.map(t=>{const fm=(data.framework_meta&&data.framework_meta[t.code])||{emoji:"",label:t.code,color:"#888"};return '<span title="'+t.reason+'" style="padding:1px 5px;border-radius:3px;font-size:9.5px;background:'+fm.color+'22;color:'+fm.color+';border:1px solid '+fm.color+'66">'+fm.emoji+" "+fm.label+'</span>';}).join("")+'</div>':"")+"</td>"+
    '<td><span class="size-tag">'+(r.size_class||"-")+(r.size_pct_recommended>0?" "+r.size_pct_recommended+"%":"")+"</span></td>"+
    '<td><span class="horizon-tag">'+(r.holding_horizon||"-")+" "+(r.horizon_days||"")+"</span></td>"+
    '<td class="num">$'+fmt(r.latest_price)+"</td>"+
    '<td class="num '+colorClass(r.week_return_pct)+'">'+arrow(r.week_return_pct)+fmt(r.week_return_pct,"%")+"</td>"+
    '<td class="num '+colorClass(r.month_return_pct)+'">'+arrow(r.month_return_pct)+fmt(r.month_return_pct,"%")+"</td>"+
    '<td class="num '+(r.dist_4w_high_pct>-1?"up":"")+'">'+fmt(r.dist_4w_high_pct,"%")+"</td>"+
    '<td class="num '+colorClass(r.rs_vs_spy_4w_pp)+'">'+arrow(r.rs_vs_spy_4w_pp)+fmt(r.rs_vs_spy_4w_pp,"pp",1)+"</td>"+
    '<td><div class="signals">'+sigs+"</div></td>"+
    '<td class="num"><strong style="color:'+cvColor+'">'+fmt(cv,"",1)+'</strong><div class="conviction-bar"><div style="width:'+cv+'%;background:'+cvColor+'"></div></div><div class="subscore">TS '+r.trend_strength+' · EQ '+r.entry_quality+' · FC '+r.fund_conviction+'</div></td>'+
    '<td class="num down">'+(r.suggested_stop_price?"$"+fmt(r.suggested_stop_price):"-")+"</td>"+
    '<td>'+renderHoldingControl(r)+"</td>"+
    "</tr>";
}

// ========== 持仓追踪 (server-side via /api/holdings, fallback localStorage) ==========
const PF_KEY = "stockchaser_portfolio_v1";
const _useServerPF = isLocalServer; // true when running via serve.py
let _pfCache = null;

async function pfLoad(){
  if(_useServerPF){
    if(_pfCache)return _pfCache;
    try{
      const r=await fetch("/api/holdings");
      if(r.ok){ _pfCache=await r.json(); return _pfCache; }
    }catch(e){}
    _pfCache={}; return _pfCache;
  }
  try{ return JSON.parse(localStorage.getItem(PF_KEY)||"{}"); }catch(e){ return {}; }
}

function pfLoadSync(){
  // Synchronous helper for renderHoldingControl etc. that can't await.
  // Returns the cached version, or empty {} if not loaded yet.
  if(_useServerPF){
    return _pfCache||{};
  }
  try{ return JSON.parse(localStorage.getItem(PF_KEY)||"{}"); }catch(e){ return {}; }
}

async function refreshPortfolioCount(){
  const pf=await pfLoad();
  const el=document.getElementById('vt-portfolio-count');
  if(el)el.textContent=Object.keys(pf).length;
}

async function pfAdd(ticker, price, shares){
  if(_useServerPF){
    try{
      const r=await fetch("/api/holdings/upsert",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({ticker,buy_price:price,shares})});
      if(r.ok){ _pfCache=null; await pfLoad(); return; }
    }catch(e){}
  }
  const pf=pfLoadSync();
  pf[ticker]={ticker,buy_price:price,shares,buy_date:new Date().toISOString().slice(0,10),batches:[{price,shares,date:new Date().toISOString().slice(0,10)}]};
  localStorage.setItem(PF_KEY,JSON.stringify(pf));
  _pfCache=null;
  await refreshPortfolioCount();
}

async function pfAddBatch(ticker, price, shares){
  // Server-side upsert already does the weighted-avg merge
  if(_useServerPF){
    try{
      const r=await fetch("/api/holdings/upsert",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({ticker,buy_price:price,shares})});
      if(r.ok){ _pfCache=null; await pfLoad(); return; }
    }catch(e){}
  }
  const pf=pfLoadSync();
  if(!pf[ticker]){ return pfAdd(ticker, price, shares); }
  const old=pf[ticker];
  const total=old.shares+shares;
  const new_avg=(old.buy_price*old.shares+price*shares)/total;
  old.buy_price=Math.round(new_avg*100)/100;
  old.shares=total;
  (old.batches||(old.batches=[])).push({price,shares,date:new Date().toISOString().slice(0,10)});
  localStorage.setItem(PF_KEY,JSON.stringify(pf));
  _pfCache=null;
  await refreshPortfolioCount();
}

async function pfRemove(ticker){
  if(_useServerPF){
    try{ await fetch("/api/holdings/remove",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({ticker})}); _pfCache=null; await pfLoad(); return; }catch(e){}
  }
  const pf=pfLoadSync(); delete pf[ticker];
  localStorage.setItem(PF_KEY,JSON.stringify(pf));
  _pfCache=null; await refreshPortfolioCount();
}

async function pfUpdateShares(ticker, newShares){
  if(newShares<=0){ return pfRemove(ticker); }
  if(_useServerPF){
    try{ await fetch("/api/holdings/update_shares",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({ticker,shares:newShares})}); _pfCache=null; await pfLoad(); return; }catch(e){}
  }
  const pf=pfLoadSync();
  if(pf[ticker]){ pf[ticker].shares=newShares; localStorage.setItem(PF_KEY,JSON.stringify(pf)); }
  _pfCache=null; await refreshPortfolioCount();
}

function render(){
  if(!data||!data.rows){return;}
  const rows=filterRows();
  let html="";
  rows.forEach((r,i)=>{
    try{
      html+=renderRow(r,i);
      if(expandedTicker===r.ticker)html+=renderDetail(r);
    }catch(e){
      // Defensive: don't let one bad row crash the whole table
      html+='<tr><td colspan="16" style="color:#f39c12;padding:6px 10px">⚠️ '+r.ticker+': '+e.message+'</td></tr>';
    }
  });
  const tbody=document.getElementById("tbody");
  if(tbody)tbody.innerHTML=html;
  document.querySelectorAll("tr.row").forEach(tr=>{
    tr.addEventListener("click",(ev)=>{
      // Don't toggle if user clicked a button inside the row
      if(ev.target.tagName==="BUTTON")return;
      const t=tr.dataset.ticker;
      expandedTicker=(expandedTicker===t)?null:t;
      render();
    });
  });
}

function promptBuy(ticker, price){
  const shares=prompt("买入 "+ticker+" 多少股? (建议参考操作手册)\n当前价: $"+price.toFixed(2),"10");
  if(!shares||isNaN(shares))return;
  const px=parseFloat(prompt("成交价 ($)?",price.toFixed(2)));
  if(isNaN(px))return;
  pfAdd(ticker, px, parseInt(shares));
  render();

function determineNextAction(held, r){
  if(!r||r.latest_price==null)return {action:"等待数据",color:"#8b949e",detail:"-"};
  const ret_pct=(r.latest_price/held.buy_price-1)*100;
  if(r.conviction_score<45)return {action:"⚠️ 减半仓",color:"#f39c12",detail:"分数 "+r.conviction_score+" < 45 警戒线"};
  if(r.suggested_stop_price && r.latest_price<=r.suggested_stop_price)return {action:"🛑 触发止损",color:"#d63031",detail:"价 $"+r.latest_price+" ≤ 止损 $"+r.suggested_stop_price};
  if(r.action==="AVOID")return {action:"🚪 全清",color:"#d63031",detail:"信号转为 AVOID"};
  const pb=r.playbook;
  if(pb){
    for(const s of (pb.stop_ladder||[]).slice().reverse()){
      if(ret_pct>=s.after_gain_pct && s.stop_price){
        return {action:"⬆️ 上调止损 $"+s.stop_price,color:"#58a6ff",detail:"涨幅 "+ret_pct.toFixed(1)+"% (覆盖 "+s.after_gain_pct+"% 档)"};
      }
    }
    for(const pt of (pb.profit_taking||[]).slice().reverse()){
      if(r.latest_price>=pt.target_price && pt.shares_to_sell>0){
        return {action:"💰 减仓 "+pt.shares_to_sell+" 股",color:"#3fb950",detail:"+"+pt.r_multiple+"R 达成"};
      }
    }
    if(held.batches && held.batches.length<(pb.entry_plan||[]).length){
      const next=pb.entry_plan[held.batches.length];
      if(next && r.latest_price>=next.price){
        return {action:"➕ 加仓 Step "+next.step,color:"#3fb950",detail:"到加仓点 $"+next.price};
      }
    }
  }
  if(ret_pct>0)return {action:"✓ 持有",color:"#3fb950",detail:"+"+ret_pct.toFixed(1)+"%"};
  return {action:"✓ 持有",color:"#8b949e",detail:ret_pct.toFixed(1)+"%"};
}

function renderPlaybook(r){
  const pb=r.playbook;
  if(!pb)return '<div style="padding:14px;color:#8b949e">⚪ 当前 '+(r.action||'-')+', 暂无 playbook (仅 TRY_BUY+ 生成)</div>';
  const cash=(data.portfolio_config&&data.portfolio_config.portfolio_cash_usd)||20000;
  let html='<div style="background:#0d1218;border:1px solid #d63031;border-radius:8px;padding:14px;margin-top:14px">';
  html+='<h4 style="color:#ff6b6b;font-size:13px;margin-bottom:10px">📋 完整操作手册 (基于 $'+cash+')</h4>';
  html+='<div style="background:rgba(214,48,49,0.08);padding:10px;border-radius:5px;margin-bottom:12px"><strong>'+pb.summary+'</strong><br><span style="color:#8b949e;font-size:11px">总投入 $'+pb.target_cash_usd+' · '+pb.target_shares+' 股 · 单笔风险 $'+pb.single_trade_risk_usd+' ('+pb.single_trade_risk_pct+'%)</span></div>';
  // Entry plan
  html+='<strong style="color:#3fb950">📥 建仓 (3 批递进)</strong>';
  html+='<table style="width:100%;font-size:11px;margin-top:6px"><thead><tr style="background:#1a1f26"><th style="padding:5px 8px">#</th><th style="padding:5px 8px;text-align:left">触发条件</th><th class="num" style="padding:5px 8px">价格</th><th class="num" style="padding:5px 8px">股数</th></tr></thead><tbody>';
  for(const e of (pb.entry_plan||[]))html+='<tr><td style="padding:5px 8px;color:#3fb950">'+e.step+'</td><td style="padding:5px 8px">'+e.trigger+'</td><td class="num" style="padding:5px 8px">$'+fmt(e.price)+'</td><td class="num" style="padding:5px 8px">'+e.shares+'</td></tr>';
  html+='</tbody></table>';
  // Stop ladder
  html+='<strong style="color:#f39c12;display:block;margin-top:10px">🛡 移动止损</strong>';
  html+='<table style="width:100%;font-size:11px;margin-top:6px"><thead><tr style="background:#1a1f26"><th style="padding:5px 8px">涨幅</th><th class="num" style="padding:5px 8px">止损线</th><th style="padding:5px 8px">说明</th></tr></thead><tbody>';
  for(const s of (pb.stop_ladder||[]))html+='<tr><td style="padding:5px 8px">+'+s.after_gain_pct+'%</td><td class="num down" style="padding:5px 8px">'+(s.stop_price?'$'+fmt(s.stop_price):'动态')+'</td><td style="padding:5px 8px;color:#8b949e">'+s.desc+'</td></tr>';
  html+='</tbody></table>';
  // Profit
  html+='<strong style="color:#d63031;display:block;margin-top:10px">💰 阶梯减仓</strong>';
  html+='<table style="width:100%;font-size:11px;margin-top:6px"><thead><tr style="background:#1a1f26"><th style="padding:5px 8px">+R</th><th class="num" style="padding:5px 8px">目标价</th><th class="num" style="padding:5px 8px">卖出</th><th style="padding:5px 8px">说明</th></tr></thead><tbody>';
  for(const p of (pb.profit_taking||[]))html+='<tr><td style="padding:5px 8px">+'+p.r_multiple+'R</td><td class="num up" style="padding:5px 8px">$'+fmt(p.target_price)+'</td><td class="num" style="padding:5px 8px">'+p.shares_to_sell+'</td><td style="padding:5px 8px;color:#8b949e">'+p.desc+'</td></tr>';
  html+='</tbody></table>';
  html+='</div>';
  return html;
}

function renderPortfolioView(){
  const pf=pfLoadSync();
  const tickers=Object.keys(pf);
  const config=(data&&data.portfolio_config)||{};
  const totalCash=config.portfolio_cash_usd||20000;
  if(tickers.length===0){
    document.getElementById('pf-content').innerHTML='<div class="empty-bt"><h3 style="color:#fff;margin-bottom:14px">💼 我的持仓</h3><p>还没有持仓记录</p><p style="margin-top:8px;color:#8b949e">在主表点击任一行的 📌 买入 按钮</p></div>';
    return;
  }
  let totalCost=0,totalValue=0;
  const rows=[];
  for(const t of tickers){
    const h=pf[t];
    const r=(data&&data.rows||[]).find(x=>x.ticker===t);
    const px=r?r.latest_price:h.buy_price;
    const cost=h.buy_price*h.shares;
    const val=px*h.shares;
    totalCost+=cost; totalValue+=val;
    rows.push({h,r,px,cost,val,ret:(px/h.buy_price-1)*100});
  }
  rows.sort((a,b)=>b.val-a.val);
  const totalRet=totalCost>0?(totalValue/totalCost-1)*100:0;

  let html='<div style="padding:0 20px 20px"><h3 style="color:#fff;margin-bottom:10px">💼 我的持仓 ('+tickers.length+'/'+(config.max_positions||10)+')</h3>';
  html+='<div class="backtest-grid">';
  html+='<div class="stat"><div class="label">已投入</div><div class="value">$'+totalCost.toFixed(0)+'</div></div>';
  html+='<div class="stat"><div class="label">当前市值</div><div class="value '+(totalRet>=0?"up":"down")+'">$'+totalValue.toFixed(0)+'</div></div>';
  html+='<div class="stat"><div class="label">总浮盈</div><div class="value '+(totalRet>=0?"up":"down")+'">'+(totalRet>=0?"+":"")+totalRet.toFixed(2)+'%</div></div>';
  html+='<div class="stat"><div class="label">现金剩余</div><div class="value">$'+(totalCash-totalCost).toFixed(0)+'</div></div>';
  html+='</div>';
  html+='<div class="chart-wrap"><h3>每只持仓 — 下一步建议</h3><table style="width:100%;font-size:11.5px"><thead><tr style="background:#1a1f26"><th style="padding:8px">Ticker</th><th style="padding:8px">买入价</th><th class="num" style="padding:8px">股数</th><th class="num" style="padding:8px">现价</th><th class="num" style="padding:8px">浮盈</th><th class="num" style="padding:8px">Conv</th><th style="padding:8px">📍 下一步</th></tr></thead><tbody>';
  for(const x of rows){
    const next=x.r?determineNextAction(x.h,x.r):{action:"-",color:"#8b949e",detail:""};
    const retCls=x.ret>=0?"up":"down";
    html+='<tr style="border-bottom:1px solid #21262d"><td style="padding:8px"><span class="ticker">'+x.h.ticker+'</span></td><td class="num" style="padding:8px">$'+x.h.buy_price.toFixed(2)+'</td><td class="num" style="padding:8px">'+x.h.shares+'</td><td class="num" style="padding:8px">$'+x.px.toFixed(2)+'</td><td class="num '+retCls+'" style="padding:8px"><strong>'+(x.ret>=0?"+":"")+x.ret.toFixed(2)+'%</strong></td><td class="num" style="padding:8px">'+(x.r?x.r.conviction_score:"-")+'</td><td style="padding:8px"><strong style="color:'+next.color+'">'+next.action+'</strong><br><span style="font-size:10px;color:#8b949e">'+next.detail+'</span></td></tr>';
  }
  html+='</tbody></table></div></div>';
  document.getElementById('pf-content').innerHTML=html;
}

// View-tab routing
document.querySelectorAll(".view-tab").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll(".view-tab").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".view").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    const target=b.dataset.view;
    const v=document.getElementById("view-"+target);
    if(v)v.classList.add("active");
    if(target==="backtest"&&typeof loadBacktest==="function")loadBacktest();
    if(target==="portfolio")renderPortfolioView();
  });
});

let _btLoaded=false;
async function loadBacktest(){
  if(_btLoaded)return;
  try{
    const r=await fetch((typeof apiBacktest!=="undefined"?apiBacktest:"../data/backtest_results.json")+"?_="+Date.now());
    if(!r.ok){document.getElementById("bt-content").innerHTML='<div class="empty-bt"><p>回测数据未生成</p><p><code>python scripts/bt_v36.py</code></p></div>';return;}
    const bt=await r.json();
    _btLoaded=true;
    const s=bt.summary||{};
    const stat=(l,v,c)=>'<div class="stat"><div class="label">'+l+'</div><div class="value '+(c||"")+'">'+v+'</div></div>';
    const cls=v=>v>=0?"up":"down";
    const fp=v=>(v>=0?"+":"")+(v*100).toFixed(2)+"%";
    let h='<div class="backtest-grid">';
    h+=stat("★ 策略总收益",fp(s.strategy_total_return||0),cls(s.strategy_total_return||0));
    h+=stat("SPY 总收益",fp(s.spy_total_return||0),cls(s.spy_total_return||0));
    h+=stat("Sharpe",(s.sharpe_ratio||0).toFixed(2));
    h+=stat("最大回撤",((s.max_drawdown||0)*100).toFixed(2)+"%","down");
    h+=stat("周胜率",((s.win_rate||0)*100).toFixed(1)+"%");
    h+=stat("总周数",s.n_weeks||0);
    h+='</div>';
    const labels={S1:"B&H SPY",S2:"6M-Mom Top3",S3:"Comp Top10",S4:"3-Gate+ATR",S5:"Conviction",S6:"★ S6 Hybrid+Stop"};
    let rs="";
    for(const k of ["S1","S2","S3","S4","S5","S6"]){
      const m=s[k+"_metrics"]; if(!m)continue;
      const star=k==="S6"?' style="background:#1a3a1f;font-weight:600"':"";
      rs+="<tr"+star+'><td style="padding:6px 12px">'+labels[k]+'</td><td class="num '+cls(m.total_return||0)+'" style="padding:6px 12px">'+fp(m.total_return||0)+'</td><td class="num" style="padding:6px 12px">'+(m.sharpe||0).toFixed(2)+'</td><td class="num down" style="padding:6px 12px">'+((m.max_drawdown||0)*100).toFixed(2)+'%</td><td class="num" style="padding:6px 12px">'+((m.win_rate||0)*100).toFixed(1)+'%</td></tr>';
    }
    h+='<div class="chart-wrap"><h3>策略横评 (★ = 你的策略)</h3><table style="width:100%;font-size:12px"><thead style="background:#1a1f26"><tr><th style="padding:8px 12px;text-align:left">策略</th><th class="num" style="padding:8px 12px">收益</th><th class="num" style="padding:8px 12px">Sharpe</th><th class="num" style="padding:8px 12px">MaxDD</th><th class="num" style="padding:8px 12px">胜率</th></tr></thead><tbody>'+rs+'</tbody></table></div>';
    document.getElementById("bt-content").innerHTML=h;
  }catch(e){document.getElementById("bt-content").innerHTML='<div class="empty-bt">加载失败: '+e.message+'</div>';}
}
